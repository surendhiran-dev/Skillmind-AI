<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Access Isolation Test</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #0f172a;
            color: #fff;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
        }

        video {
            width: 100%;
            border-radius: 8px;
            border: 2px solid #3b82f6;
            margin-top: 10px;
            background: #000;
        }

        .status {
            margin: 15px 0;
            padding: 10px;
            border-radius: 6px;
        }

        .success {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid #22c55e;
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid #ef4444;
        }

        .info {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid #3b82f6;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
        }

        button:hover {
            background: #2563eb;
        }

        pre {
            text-align: left;
            background: #1e293b;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Hardware Isolation Test</h1>
        <p>This page tests your Camera and Microphone independently of the main app.</p>

        <button id="testBtn">Test Camera & Mic</button>

        <div id="statusBox" class="status info">Ready to test.</div>

        <video id="testVideo" autoplay playsinline muted></video>

        <div style="margin-top:20px; text-align:left;">
            <h4>Diagnostic Info:</h4>
            <pre id="diagOutput">Waiting for test...</pre>
        </div>
    </div>

    <script>
        const btn = document.getElementById('testBtn');
        const statusBox = document.getElementById('statusBox');
        const diag = document.getElementById('diagOutput');
        const video = document.getElementById('testVideo');

        function log(msg, type = 'info') {
            diag.textContent += `\n[${new Date().toLocaleTimeString()}] ${msg}`;
            statusBox.textContent = msg;
            statusBox.className = `status ${type}`;
        }

        btn.onclick = async () => {
            diag.textContent = "Starting test...";
            log("Requesting getUserMedia...");

            try {
                log("Secure Context: " + window.isSecureContext);

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                log("SUCCESS! Camera and Mic initialized.", "success");
                video.srcObject = stream;

                const tracks = stream.getTracks().map(t => `${t.kind}: ${t.label} (${t.readyState})`);
                log("Tracks found: " + tracks.join(', '), "success");
            } catch (err) {
                console.error(err);
                log(`FAILED: ${err.name} - ${err.message}`, "error");

                if (err.name === 'NotAllowedError') {
                    log("ACTION REQUIRED: Go to Windows Settings > Privacy > Camera and enable 'Allow desktop apps to access your camera'. Also reset browser permissions.", "error");
                }
            }
        };

        // Enumerate devices immediately
        (async () => {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const list = devices.map(d => `${d.kind}: ${d.label || 'Unknown (Permission required to see label)'}`);
                diag.textContent += "\nDevices found:\n" + list.join('\n');
            } catch (err) {
                diag.textContent += "\nCould not enumerate devices: " + err.message;
            }
        })();
    </script>
</body>

</html>
